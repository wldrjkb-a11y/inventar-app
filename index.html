<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Inventar Pro MAX</title>

<style>
body { font-family: Arial; margin: 15px; background:#f4f4f4; }

.container {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.box {
  background:white;
  padding:10px;
  border-radius:8px;
}

.item {
  display:flex;
  justify-content:space-between;
  padding:8px;
  border-bottom:1px solid #ddd;
  align-items:center;
}

input,select,button {
  width:100%;
  padding:6px;
  margin:5px 0;
}

.topbar {
  display:flex;
  gap:5px;
  flex-wrap:wrap;
  margin-bottom:10px;
}

.topbar button {
  width:auto;
}
.small {
  font-size:12px;
  opacity:0.7;
}
</style>
</head>

<body>

<h2>📦 Inventar Pro MAX System</h2>

<div class="topbar" id="catBar"></div>

<div class="container">

<!-- LINKS -->
<div class="box">

<h3>➕ Artikel</h3>

<input id="search" placeholder="🔎 Suche..." oninput="render()">

<input id="name" placeholder="Artikelname">

<select id="cat"></select>

<input id="stock" type="number" placeholder="Bestand">
<input id="min" type="number" placeholder="Mindestbestand">

<button onclick="saveItem()">Speichern</button>

<hr>

<h3>🏷 Kategorien bearbeiten</h3>

<input id="newCat" placeholder="Neue Kategorie">
<button onclick="addCat()">Kategorie hinzufügen</button>

<div id="catList"></div>

<hr>

<h3>📦 Artikel Liste</h3>
<div id="list"></div>

</div>

<!-- RECHTS -->
<div class="box">

<h3>🛒 Einkaufsliste</h3>
<div id="shop"></div>

</div>

</div>

<script>

let items = JSON.parse(localStorage.getItem("items")) || [];

let cats = JSON.parse(localStorage.getItem("cats")) || [
  "Bad 1","Bad 2","Bad 3","Bad 4","Bad 5","Lebensmittel"
];

let activeCat = "Alle";
let editId = null;

/* SAVE */
function persist(){
  localStorage.setItem("items", JSON.stringify(items));
  localStorage.setItem("cats", JSON.stringify(cats));
  render();
}

/* ---------------- KATEGORIEN ---------------- */

function addCat(){
  let v = document.getElementById("newCat").value;
  if(!v) return;
  cats.push(v);
  persist();
}

function renameCat(oldName){
  let newName = prompt("Neuer Name:", oldName);
  if(!newName) return;

  cats = cats.map(c => c === oldName ? newName : c);
  items.forEach(i => {
    if(i.cat === oldName) i.cat = newName;
  });

  persist();
}

function deleteCat(name){
  cats = cats.filter(c => c !== name);
  items.forEach(i => {
    if(i.cat === name) i.cat = "Unsortiert";
  });
  persist();
}

/* ---------------- ARTIKEL ---------------- */

function saveItem(){

  let name = document.getElementById("name").value;
  let cat = document.getElementById("cat").value;
  let stock = parseInt(document.getElementById("stock").value) || 0;
  let min = parseInt(document.getElementById("min").value) || 0;

  if(!name) return;

  if(editId){

    let i = items.find(x => x.id === editId);
    i.name = name;
    i.cat = cat;
    i.stock = stock;
    i.min = min;

  } else {

    items.push({
      id: Date.now(),
      name,
      cat,
      stock,
      min
    });

  }

  editId = null;
  clearForm();
  persist();
}

function clearForm(){
  document.getElementById("name").value = "";
  document.getElementById("stock").value = "";
  document.getElementById("min").value = "";
}

/* EDIT */
function editItem(id){
  let i = items.find(x => x.id === id);

  editId = id;

  document.getElementById("name").value = i.name;
  document.getElementById("cat").value = i.cat;
  document.getElementById("stock").value = i.stock;
  document.getElementById("min").value = i.min;
}

/* DELETE ITEM */
function deleteItem(id){
  items = items.filter(x => x.id !== id);
  persist();
}

/* STOCK */
function changeStock(id,val){
  let i = items.find(x => x.id === id);
  i.stock += val;
  if(i.stock < 0) i.stock = 0;
  persist();
}

/* BUY */
function buy(id){
  let i = items.find(x => x.id === id);
  let m = parseInt(prompt("Wie viele gekauft?"));
  if(!m) return;
  i.stock += m;
  persist();
}

/* FILTER */
function setCat(c){
  activeCat = c;
  render();
}

/* ---------------- RENDER ---------------- */

function render(){

  let search = document.getElementById("search").value?.toLowerCase() || "";

  /* CATEGORY BAR */
  let bar = document.getElementById("catBar");
  bar.innerHTML = "";

  bar.innerHTML += `<button onclick="setCat('Alle')">Alle</button>`;

  cats.forEach(c=>{
    bar.innerHTML += `<button onclick="setCat('${c}')">${c}</button>`;
  });

  /* SELECT */
  let sel = document.getElementById("cat");
  sel.innerHTML = "";
  cats.forEach(c=>{
    sel.innerHTML += `<option>${c}</option>`;
  });

  /* CATEGORY EDIT LIST */
  let catList = document.getElementById("catList");
  catList.innerHTML = "";

  cats.forEach(c=>{
    catList.innerHTML += `
      <div class="item">
        <div>${c}</div>
        <div>
          <button onclick="renameCat('${c}')">✏️</button>
          <button onclick="deleteCat('${c}')">🗑</button>
        </div>
      </div>
    `;
  });

  /* ITEMS */
  let list = document.getElementById("list");
  let shop = document.getElementById("shop");

  list.innerHTML = "";
  shop.innerHTML = "";

  let sorted = [...items].sort((a,b)=>a.name.localeCompare(b.name));

  sorted.forEach(i=>{

    if(activeCat !== "Alle" && i.cat !== activeCat) return;
    if(search && !i.name.toLowerCase().includes(search)) return;

    list.innerHTML += `
      <div class="item">
        <div>
          <b>${i.name}</b> (${i.cat})<br>
          Bestand: ${i.stock} | Min: ${i.min}
        </div>

        <div>
          <button onclick="changeStock(${i.id},1)">+</button>
          <button onclick="changeStock(${i.id},-1)">-</button>
          <button onclick="editItem(${i.id})">✏️</button>
          <button onclick="deleteItem(${i.id})">🗑</button>
        </div>
      </div>
    `;

    if(i.stock <= i.min){
      shop.innerHTML += `
        <div class="item">
          <div>
            <b>${i.name}</b> fehlt ${i.min - i.stock}
          </div>
          <button onclick="buy(${i.id})">gekauft</button>
        </div>
      `;
    }

  });

}

render();

</script>

</body>
</html>
